min_version = "2026.6.14"

[settings]
lockfile = true

[tools]
node = "24.18.0"
wrangler = { version = "4.110.0", depends = ["node"] }
gh = "2.96.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
actionlint = "1.7.12"
"github:nushell/nushell" = "0.113.1"
colima = { version = "0.10.3", os = ["macos", "linux"] }
docker-cli = { version = "29.6.1", os = ["macos", "linux"] }
docker-compose = { version = "5.3.1", os = ["macos", "linux"] }

[tasks.install]
description = "Install locked JavaScript dependencies"
run = "pnpm install --frozen-lockfile"

[tasks.build]
description = "Build all implemented workspace components"
run = "pnpm build"

[tasks.format]
description = "Apply canonical formatting"
run = "pnpm format"

[tasks."format:check"]
description = "Verify canonical formatting"
run = "pnpm format:check"

[tasks.lint]
description = "Run code, shell, workflow, and Markdown linting"
run = "pnpm lint"

[tasks.typecheck]
description = "Run strict TypeScript checks"
run = "pnpm typecheck"

[tasks.test]
description = "Run repository tests"
run = "pnpm test"

[tasks."test:watch"]
description = "Run tests continuously during TDD"
run = "pnpm test:watch"

[tasks."db:migrate"]
description = "Apply pending migrations to the repository-local D1 database"
run = "pnpm db:migrate:local"

[tasks."scenario:reset"]
description = "Remove only the controlled regression evidence from local D1"
run = "pnpm scenario:reset"

[tasks."scenario:reseed"]
description = "Reset and regenerate measured good-versus-bad local evidence"
run = "pnpm scenario:reseed"

[tasks.e2e]
description = "Run the currently implemented credential-free E2E scope"
run = "pnpm e2e"

[tasks.check]
description = "Run all non-deployment quality gates"
run = "pnpm check"

[tasks.doctor]
description = "Verify the local foundation and pinned tools"
run = "pnpm run doctor"

[tasks.dev]
description = "Run the credential-free Cloudflare local stack"
run = "pnpm dev"

[tasks."dev:live"]
description = "Build and run locally with the live Workers AI binding"
run = "pnpm dev:live"

[tasks."container:check"]
description = "Validate the optional single-container Compose model"
run = "docker-cli-plugin-docker-compose --file compose.yaml config --quiet"

[tasks."container:up"]
description = "Start the optional named Colima and Compose stack"
run = "node scripts/container.ts up"

[tasks."container:down"]
description = "Stop only project-owned Compose and Colima resources"
run = "node scripts/container.ts down"

[tasks.teardown]
description = "Remove project-owned local runtime state"
run = "sh scripts/teardown"
