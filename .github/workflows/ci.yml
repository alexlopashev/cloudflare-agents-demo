name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: false
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes zsh fish
      - run: mise install node wrangler gh shellcheck shfmt actionlint 'github:nushell/nushell'
      - run: mise exec node -- corepack prepare pnpm@10.34.5 --activate
      - run: mise exec node -- corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - run: mise run doctor
      - run: mise run check
      - run: mise run e2e
      - run: mise run build
